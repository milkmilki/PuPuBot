<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">PuPuBot 记忆系统架构图</title>
  <desc id="desc">展示 PuPuBot 如何用 SQLite 保存结构化主记忆，并把 facts、事件线和摘要投影成内置语义索引 card。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#f3f7fb"/>
      <stop offset="1" stop-color="#eef7f3"/>
    </linearGradient>
    <linearGradient id="sqlite" x1="0" x2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="semantic" x1="0" x2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="review" x1="0" x2="1">
      <stop offset="0" stop-color="#ea580c"/>
      <stop offset="1" stop-color="#ca8a04"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-16%" width="132%" height="132%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .small { font-size: 15px; fill: #475569; }
      .tiny { font-size: 13px; fill: #64748b; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #475569; }
      .lane-title { font-size: 19px; font-weight: 700; fill: white; }
      .card-title { font-size: 18px; font-weight: 700; }
      .card { fill: white; stroke: #d7e0ea; stroke-width: 1.2; rx: 14; filter: url(#shadow); }
      .mini { fill: #f8fafc; stroke: #dbe4ee; stroke-width: 1; rx: 10; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .badge { font-size: 12px; font-weight: 700; fill: white; }
      .mono { font-family: "Cascadia Mono", Consolas, monospace; font-size: 13px; fill: #334155; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>

  <text x="64" y="58" class="title">PuPuBot 记忆系统</text>
  <text x="64" y="86" class="subtitle">SQLite 是唯一事实源；semantic_cards 是由 SQLite 投影出的 embedding 召回缓存，可以删除并重建。</text>

  <rect x="64" y="120" width="260" height="82" rx="16" fill="#ffffff" stroke="#dbe4ee" filter="url(#shadow)"/>
  <text x="88" y="153" class="card-title">聊天输入</text>
  <text x="88" y="178" class="small">QQ 私聊 / 群聊 / CLI</text>

  <rect x="370" y="120" width="292" height="82" rx="16" fill="#ffffff" stroke="#dbe4ee" filter="url(#shadow)"/>
  <text x="394" y="153" class="card-title">人物转写</text>
  <text x="394" y="178" class="small">QQ 号映射稳定人物名</text>

  <rect x="708" y="120" width="306" height="82" rx="16" fill="#ffffff" stroke="#dbe4ee" filter="url(#shadow)"/>
  <text x="732" y="153" class="card-title">Batch Review</text>
  <text x="732" y="178" class="small">摘要、facts、事件线、任务更新</text>

  <path d="M324 161 C338 161 354 161 370 161" class="line"/>
  <path d="M662 161 C676 161 692 161 708 161" class="line"/>

  <rect x="64" y="250" width="540" height="318" rx="20" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <rect x="64" y="250" width="540" height="52" rx="20" fill="url(#sqlite)"/>
  <text x="90" y="283" class="lane-title">SQLite 主记忆库</text>
  <text x="446" y="283" class="badge">Source of Truth</text>

  <rect x="90" y="326" width="146" height="72" class="mini"/>
  <text x="110" y="353" class="card-title">people</text>
  <text x="110" y="377" class="tiny">人物身份与别名</text>

  <rect x="252" y="326" width="146" height="72" class="mini"/>
  <text x="272" y="353" class="card-title">messages</text>
  <text x="272" y="377" class="tiny">原始对话记录</text>

  <rect x="414" y="326" width="146" height="72" class="mini"/>
  <text x="434" y="353" class="card-title">summaries</text>
  <text x="434" y="377" class="tiny">批次摘要</text>

  <rect x="90" y="420" width="220" height="86" class="mini"/>
  <text x="110" y="449" class="card-title">person_facts</text>
  <text x="110" y="474" class="tiny">个人 facts / 关系 facts</text>
  <text x="110" y="494" class="mono">subject → object</text>

  <rect x="340" y="420" width="220" height="86" class="mini"/>
  <text x="360" y="449" class="card-title">event_threads</text>
  <text x="360" y="474" class="tiny">持续事件线当前状态</text>
  <text x="360" y="494" class="mono">title / status / hint</text>

  <rect x="90" y="524" width="220" height="30" rx="10" fill="#eef6ff" stroke="#bfdbfe"/>
  <text x="110" y="544" class="tiny">event_steps：user / instance / time / system</text>

  <rect x="340" y="524" width="220" height="30" rx="10" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="360" y="544" class="tiny">event_people：事件与人物索引</text>

  <rect x="690" y="250" width="526" height="318" rx="20" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <rect x="690" y="250" width="526" height="52" rx="20" fill="url(#semantic)"/>
  <text x="716" y="283" class="lane-title">内置语义索引缓存</text>
  <text x="1084" y="283" class="badge">Embedding RAG</text>

  <rect x="716" y="326" width="212" height="86" class="mini"/>
  <text x="738" y="355" class="card-title">Source Cards</text>
  <text x="738" y="380" class="tiny">SQLite 行的自然语言投影</text>
  <text x="738" y="400" class="mono">小夫 | 外貌: 光头</text>

  <rect x="972" y="326" width="218" height="86" class="mini"/>
  <text x="994" y="355" class="card-title">Metadata</text>
  <text x="994" y="380" class="tiny">可追溯、可校验、可重建</text>
  <text x="994" y="400" class="mono">source_key / version</text>

  <rect x="716" y="438" width="212" height="78" class="mini"/>
  <text x="738" y="467" class="card-title">Embedding Search</text>
  <text x="738" y="492" class="tiny">召回 summary / fact / event</text>

  <rect x="972" y="438" width="218" height="78" class="mini"/>
  <text x="994" y="467" class="card-title">/tidy</text>
  <text x="994" y="492" class="tiny">补齐缺失、删除孤儿、刷新过期</text>

  <path d="M1014 161 C1066 161 1092 206 1092 250" class="line-soft"/>
  <text x="1040" y="205" class="tiny">写入后投影</text>

  <path d="M604 404 C634 404 660 404 690 404" class="line"/>
  <text x="624" y="390" class="tiny">自然语言 card</text>

  <path d="M690 486 C662 486 634 486 604 486" class="line-soft"/>
  <text x="620" y="522" class="tiny">按 source_key 回查 SQLite 最新值</text>

  <rect x="64" y="620" width="354" height="82" rx="16" fill="#fff7ed" stroke="#fed7aa" filter="url(#shadow)"/>
  <text x="88" y="653" class="card-title">写入前候选召回</text>
  <text x="88" y="678" class="small">facts: 语义索引召回，失败退回 SQLite overlap</text>

  <rect x="464" y="620" width="354" height="82" rx="16" fill="#f0f9ff" stroke="#bae6fd" filter="url(#shadow)"/>
  <text x="488" y="653" class="card-title">事件线归并</text>
  <text x="488" y="678" class="small">events: SQLite FTS5 + overlap + 状态/人物重排</text>

  <rect x="864" y="620" width="352" height="82" rx="16" fill="#f8fafc" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="888" y="653" class="card-title">Prompt 注入与可视化</text>
  <text x="888" y="678" class="small">自然想起的事 / /events url / facts 图谱</text>

  <path d="M861 202 C844 244 822 290 822 326" class="line"/>
  <text x="824" y="238" class="tiny">写入 summary</text>

  <path d="M210 620 C210 594 210 582 210 568" class="line"/>
  <path d="M641 620 C641 594 520 582 488 568" class="line"/>
  <path d="M1040 620 C1040 580 1040 544 1040 516" class="line"/>

  <path d="M928 438 C928 588 986 596 1040 620" class="line"/>
  <text x="942" y="586" class="tiny">RAG 结果</text>

  <rect x="92" y="708" width="1094" height="32" rx="16" fill="#0f172a" opacity="0.92"/>
  <text x="116" y="730" fill="#ffffff" font-size="14">原则：SQLite 保存结构化真实记忆；semantic_cards 只保存可重建的 embedding 召回缓存；模型写入长期记忆前先看候选，尽量更新旧记忆而不是制造重复。</text>
</svg>
